plugins {
    id 'com.android.application'
}

android {
    namespace 'am_trouzine.TTasksTimer'
    compileSdk 34

    defaultConfig {
        applicationId "am_trouzine.TTasksTimer"
        minSdk 19
        targetSdk 34
        versionCode 3
        versionName "1.0.2"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
    
    sourceSets {
        main {
            manifest.srcFile 'src/main/AndroidManifest.xml'
            java.srcDirs = ['src/main/java']
            res.srcDirs = ['src/main/res']
            assets.srcDirs = ['../../web'] 
        }
    }
}

dependencies {
    // No dependencies needed
}
